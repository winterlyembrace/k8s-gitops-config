apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-l2-config
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/winterlyembrace/k8s-gitops-config.git
    targetRevision: HEAD
    path: k8s-gitops-config/cilium-config
  destination:
    server: '192.168.122.200'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
