apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-l2-config
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: '192.168.122.200'
  project: default
  source:
    path: k8s-gitops-config/cilium-config
    repoURL: https://github.com/winterlyembrace/k8s-gitops-config.git
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
