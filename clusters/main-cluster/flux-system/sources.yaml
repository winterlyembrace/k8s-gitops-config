apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: backend-repo
  namespace: flux-system
spec:
  image: index.docker.io/winterlyembrace/chpod-backend-prod
  interval: 5m
