apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: frontend-repo
  namespace: flux-system
spec:
  image: index.docker.io/winterlyembrace/chpod-frontend-prod
  interval: 5m