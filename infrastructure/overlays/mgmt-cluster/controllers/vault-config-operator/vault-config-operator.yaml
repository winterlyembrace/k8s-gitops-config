apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault-config-operator
  namespace: vault
spec:
  interval: 1h
  chart:
    spec:
      chart: vault-config-operator
      version: "0.8.38"
      sourceRef:
        kind: HelmRepository
        name: vault-config-operator
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    enableCertManager: true
