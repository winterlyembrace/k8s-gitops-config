apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials 
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: "grafana/creds"
        property: username
    - secretKey: admin-password
      remoteRef:
        key: "grafana/creds"
        property: password
