apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: chpod
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/chpod
      sourceRef:
        kind: GitRepository
        name: https://github.com/winterlyembrace/chpod.git
  values:
    replicaCount: 2
    image:
      tag: "v1.0"