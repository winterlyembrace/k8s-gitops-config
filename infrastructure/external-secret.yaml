apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: libvirt-ssh-key
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: libvirt-ssh-key
  data:
    - remoteRef:
        key: secret/libvirt/ssh
        property: id_rsa
      secretKey: id_rsa
