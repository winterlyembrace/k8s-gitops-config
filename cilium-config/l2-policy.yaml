apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: "l2-policy"
spec:
  serviceSelector:
    matchLabels:
      color: blue
  nodeSelector:
    matchExpressions:
      - key: "kubernetes.io/os"
        operator: In
        values:
          - linux
  interfaces:
    - ens4
  externalIPs: true
  loadBalancerIPs: true
